name: WindowLocker Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  SOLUTION_FILE: WindowLocker.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  BUILD_OUTPUT_DIR: bin\x64\Release

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore $env:SOLUTION_FILE
        shell: pwsh

      - name: Set version
        id: set_version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $today = Get-Date -Format "yyyy.MM.dd"
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $version = "$today-$shortSha"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Set artifact names
        id: set_artifact_name
        run: |
          $version = "${{ steps.set_version.outputs.version }}"
          "artifact_name=WindowLocker-$version-Release" >> $env:GITHUB_OUTPUT
          "zip_name=WindowLocker-$version-x64.zip" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build release
        run: >
          msbuild $env:SOLUTION_FILE
          /t:Build
          /p:Configuration=$env:BUILD_CONFIGURATION
          /p:Platform=$env:BUILD_PLATFORM
        shell: pwsh

      - name: Verify build output
        id: verify_output
        run: |
          $buildOutput = Join-Path $env:GITHUB_WORKSPACE $env:BUILD_OUTPUT_DIR

          if (-not (Test-Path -LiteralPath $buildOutput)) {
            Write-Error "Build output directory not found: $buildOutput"
          }

          Get-ChildItem -LiteralPath $buildOutput -Recurse | Select-Object FullName, Length, LastWriteTime
          "build_output=$buildOutput" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Prepare release files
        id: prepare_release
        run: |
          $buildOutput = "${{ steps.verify_output.outputs.build_output }}"
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "ReleaseFiles"

          New-Item -Path $releaseDir -ItemType Directory -Force | Out-Null
          Copy-Item -Path (Join-Path $buildOutput "*") -Destination $releaseDir -Recurse -Force

          if (Test-Path -LiteralPath "README.md") {
            Copy-Item -LiteralPath "README.md" -Destination $releaseDir -Force
          }

          Get-ChildItem -LiteralPath $releaseDir -Recurse | Select-Object FullName, Length
          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create zip package
        id: create_zip
        run: |
          $releaseDir = "${{ steps.prepare_release.outputs.release_dir }}"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.set_artifact_name.outputs.zip_name }}"

          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $releaseDir "*") -DestinationPath $zipPath
          "zip_file=$zipPath" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.artifact_name }}
          path: |
            ${{ steps.prepare_release.outputs.release_dir }}/**
            ${{ steps.create_zip.outputs.zip_file }}
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: WindowLocker ${{ steps.set_version.outputs.version }}
          draft: false
          prerelease: false
          files: ${{ steps.create_zip.outputs.zip_file }}
          token: ${{ github.token }}
          body: |
            ## Install
            1. Download the zip file for this release.
            2. Extract all files to a folder of your choice.
            3. Run `WindowLocker.exe`.

  download-artifacts:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: downloaded-artifact

      - name: Verify downloaded artifact
        run: |
          Write-Host "Artifact name: ${{ needs.build.outputs.artifact_name }}"
          Write-Host "Build version: ${{ needs.build.outputs.version }}"

          if (-not (Test-Path -LiteralPath "downloaded-artifact")) {
            Write-Error "Artifact directory not found."
          }

          Get-ChildItem -LiteralPath "downloaded-artifact" -Recurse
        shell: pwsh
